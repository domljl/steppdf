<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Step PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body class="min-h-[100dvh] bg-zinc-950 text-zinc-100 antialiased">
    <main class="min-h-[100dvh] bg-[radial-gradient(circle_at_20%_10%,rgba(16,185,129,0.14),transparent_30%),linear-gradient(180deg,#09090b_0%,#18181b_100%)] px-4 py-5 sm:px-6 lg:px-8">
      <section class="mx-auto grid w-full max-w-7xl gap-5">
        <header class="flex flex-col gap-4 border-b border-white/10 pb-5 md:flex-row md:items-end md:justify-between">
          <div>
            <h1 class="text-5xl font-semibold leading-none tracking-normal text-white sm:text-6xl">Step PDF</h1>
            <p class="mt-3 max-w-xl text-base leading-7 text-zinc-400">Convert decks and documents into one ordered PDF.</p>
          </div>
          <span class="w-fit rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1.5 text-sm font-medium text-emerald-200">Auto-deletes after 1 hour</span>
        </header>

        <form class="grid gap-5 lg:grid-cols-[0.9fr_1.1fr]" id="conversion-form" data-max-files="50" data-max-total-bytes="1073741824">
          <div class="grid gap-4">
            <p class="rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm leading-6 text-zinc-400">Files are processed for conversion and automatically deleted after one hour. Accepted: PPTX, PPT, DOCX, and PDF.</p>

            <label class="group grid min-h-[280px] cursor-pointer place-items-center rounded-3xl border border-dashed border-zinc-700 bg-zinc-900/80 p-8 text-center shadow-2xl shadow-black/30 transition duration-200 hover:-translate-y-0.5 hover:border-emerald-300/70 hover:bg-zinc-900 focus-within:border-emerald-300/70 sm:min-h-[360px]" id="dropzone">
              <input class="sr-only" id="file-input" type="file" multiple accept=".pptx,.ppt,.docx,.pdf">
              <span class="max-w-xs text-5xl font-semibold leading-none tracking-normal text-white sm:text-6xl">Drop documents here</span>
              <small class="mt-5 text-sm font-medium text-zinc-500 group-hover:text-emerald-200">or browse files</small>
            </label>
            <div class="min-h-5 text-sm font-medium text-red-300" id="file-message" role="status" aria-live="polite"></div>
          </div>

          <div class="grid gap-4">
            <section class="rounded-3xl border border-white/10 bg-zinc-900/80 p-5 shadow-2xl shadow-black/20" aria-labelledby="selected-files-heading">
              <div class="flex items-baseline justify-between gap-4">
                <h2 class="text-base font-semibold text-white" id="selected-files-heading">Selected files</h2>
                <span class="text-sm text-zinc-500">Drag to reorder</span>
              </div>
              <ol class="mt-4 grid gap-2" id="selected-files">
                <li class="mt-1 text-sm text-zinc-500">No files selected yet.</li>
              </ol>
              <input id="merge-order" name="merge_order" type="hidden" value="[]">
            </section>

            <label class="grid gap-2 rounded-3xl border border-white/10 bg-zinc-900/80 p-5">
              <span class="text-base font-semibold text-white">Output filename</span>
              <input class="w-full rounded-xl border border-white/10 bg-zinc-950 px-3 py-3 text-zinc-100 outline-none transition placeholder:text-zinc-600 focus:border-emerald-300/70 focus:ring-4 focus:ring-emerald-400/10" name="output_filename" value="{{ default_filename }}">
            </label>

            <button class="w-fit rounded-xl bg-emerald-300 px-5 py-3 font-semibold text-zinc-950 transition duration-150 hover:bg-emerald-200 active:translate-y-px disabled:cursor-not-allowed disabled:bg-zinc-700 disabled:text-zinc-400" id="convert-button" type="button" disabled>Convert</button>

            <section class="rounded-3xl border border-white/10 bg-zinc-900/80 p-5" aria-labelledby="progress-heading">
              <div class="flex items-baseline justify-between gap-4">
                <h2 class="text-base font-semibold text-white" id="progress-heading">Progress</h2>
              </div>
              <div class="mt-4 text-sm leading-6 text-zinc-500" id="progress-panel">Waiting for files.</div>
            </section>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
